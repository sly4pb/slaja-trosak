services:

  # ─── PHP-FPM ───────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: slaja-trosak-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
    networks:
      - slaja-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── NGINX ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: slaja-trosak-nginx
    restart: unless-stopped
    ports:
      - "8091:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - slaja-network
    depends_on:
      - app

  # ─── MySQL 8 ───────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: slaja-trosak-db
    restart: unless-stopped
    ports:
      - "3340:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-slaja_trosak}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - slaja-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: slaja-trosak-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_FORWARD:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - slaja-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # ─── Mailpit ───────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: slaja-trosak-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_HTTP_PORT:-8025}:8025"   # Web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025"   # SMTP
    networks:
      - slaja-network

# ─── Volumes ───────────────────────────────────────────────
volumes:
  db-data:
    driver: local
  redis-data:
    driver: local

# ─── Networks ──────────────────────────────────────────────
networks:
  slaja-network:
    driver: bridge
